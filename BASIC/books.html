<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, 
  initial-scale=1.0">
  <title>Online Bookstore</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }
    body {
      background-color: #f9f9f9;
      color: #333;
    }
    header {
      background-color: #2c3e50;
      color: white;
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .logo {
      font-size: 24px;
      font-weight: bold;
    }
    nav ul {
      list-style: none;
      display: flex;
      gap: 20px;
    }
    nav ul li a {
      color: white;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.3s;
    }
    nav ul li a:hover {
      color: #f39c12;
    }
    .banner {
      background: url('https://images.unsplash.com/photo-1512820790803-83ca734da794?auto=format&fit=crop&w=1500&q=80') no-repeat center center/cover;
      height: 300px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: white;
      text-shadow: 2px 2px 4px #000;
    }
    .banner h1 {
      font-size: 2.5em;
      margin-bottom: 10px;
    }
    .banner p {
      font-size: 1.2em;
    }
    .categories {
      padding: 40px 20px;
      text-align: center;
    }
    .categories h2 {
      margin-bottom: 25px;
      color: #2c3e50;
    }
    .book-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      max-width: 1000px;
      margin: auto;
    }
    .book {
      background-color: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      transition: transform 0.3s;
    }
    .book:hover {
      transform: translateY(-5px);
    }
    .book img {
      width: 100%;
      height: 250px;
      object-fit: cover;
      border-radius: 8px;
    }
    .book h3 {
      margin: 10px 0;
      font-size: 1.1em;
    }
    .book button {
      background-color: #2c3e50;
      color: white;
      border: none;
      padding: 8px 12px;
      border-radius: 5px;
      cursor: pointer;
      transition: background-color 0.3s;
    }
    .book button:hover {
      background-color: #f39c12;
    }
    footer {
      background-color: #2c3e50;
      color: white;
      text-align: center;
      padding: 20px 10px;
      margin-top: 30px;
    }
    .footer-links a {
      color: #f39c12;
      margin: 0 10px;
      text-decoration: none;
    }
    .footer-links a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">📚 BookNest</div>
    <nav>
      <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">Categories</a></li>
        <li><a href="#">Best Sellers</a></li>
        <li><a href="#">My Cart</a></li>
      </ul>
    </nav>
  </header>
  <section class="banner">
    <h1>Featured Book: “The Secret Garden”</h1>
    <p>Discover the magic within every page. Get 20% off today!</p>
  </section>
  <section class="categories">
    <h2>Book Categories</h2>
    <div class="book-grid">
      <div class="book">
        <img src="https://images.unsplash.com/photo-1524995997946-a1c2e315a42f?auto=format&fit=crop&w=800&q=80" alt="Fiction">
        <h3>Fiction</h3>
        <button>Add to Cart</button>
      </div>
      <div class="book">
        <img src="https://images.unsplash.com/photo-1481627834876-b7833e8f5570?auto=format&fit=crop&w=800&q=80" alt="Science">
        <h3>Science</h3>
        <button>Add to Cart</button>
      </div>
      <div class="book">
        <img src="https://images.unsplash.com/photo-1507842217343-583bb7270b66?auto=format&fit=crop&w=800&q=80" alt="History">
        <h3>History</h3>
        <button>Add to Cart</button>
      </div>
      <div class="book">
        <img src="https://images.unsplash.com/photo-1507842217343-583bb7270b66?auto=format&fit=crop&w=800&q=80" alt="Children">
        <h3>Children</h3>
        <button>Add to Cart</button>
      </div>
    </div>
  </section>
  <footer>
    <div class="footer-links">
      <a href="#">About Us</a> |
      <a href="#">Contact</a> |
      <a href="#">FAQs</a>
    </div>
    <p>© 2025 BookNest. All rights reserved.</p>
  </footer>
</body>
</html>
